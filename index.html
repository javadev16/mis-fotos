<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Fotos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:#000;
}

h1{
    font-size:2rem;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:15px;
    padding:20px;
}

.foto{
    overflow:hidden;
    border-radius:12px;
    cursor:pointer;
}

.foto img{
    width:100%;
    height:300px;
    object-fit:cover;
    transition:.3s;
}

.foto:hover img{
    transform:scale(1.05);
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
}

.cerrar{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
    <h1>Mi Galería de Fotos 2026</h1>
</header>

<div class="galeria">

    <div class="foto">
        <img src="https://raw.githubusercontent.com/javadev16/mis-fotos/main/foto1.png">
    </div>

    <div class="foto">
        <img src="https://raw.githubusercontent.com/javadev16/mis-fotos/main/foto2.png">
    </div>

    <div class="foto">
        <img src="https://raw.githubusercontent.com/javadev16/mis-fotos/main/foto3.png">
    </div>

    <div class="foto">
        <img src="https://raw.githubusercontent.com/javadev16/mis-fotos/main/foto4.png">
    </div>
<div class="foto">
        <img src="https://raw.githubusercontent.com/javadev16/mis-fotos/main/ella218055.png">
    </div>
<div class="foto">
        <img src="https://raw.githubusercontent.com/javadev16/mis-fotos/main/foto5.png">
    </div>

</div>

<div class="lightbox" id="lightbox">
    <span class="cerrar">&times;</span>
    <img id="imagenGrande">
</div>

<script>
const fotos = document.querySelectorAll(".foto img");
const lightbox = document.getElementById("lightbox");
const imagenGrande = document.getElementById("imagenGrande");

fotos.forEach(foto => {
    foto.addEventListener("click", () => {
        imagenGrande.src = foto.src;
        lightbox.style.display = "flex";
    });
});

lightbox.addEventListener("click", () => {
    lightbox.style.display = "none";
});
</script>

</body>
</html>
